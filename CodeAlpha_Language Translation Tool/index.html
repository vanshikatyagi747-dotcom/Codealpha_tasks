<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Translation Tool</title>
    <!-- Tailwind CSS for modern UI styling -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-2xl">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
            🌐 Language Translation Tool
        </h1>

        <!-- Controls: Language Selectors -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Source Language</label>
                <select id="sourceLang" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-700">
                    <option value="en">English</option>
                    <option value="es">Spanish (Español)</option>
                    <option value="fr">French (Français)</option>
                    <option value="de">German (Deutsch)</option>
                    <option value="it">Italian (Italiano)</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Target Language</label>
                <select id="targetLang" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-700">
                    <option value="es" selected>Spanish (Español)</option>
                    <option value="en">English</option>
                    <option value="fr">French (Français)</option>
                    <option value="de">German (Deutsch)</option>
                    <option value="it">Italian (Italiano)</option>
                </select>
            </div>
        </div>

        <!-- Text Areas Container -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Input Area -->
            <div class="flex flex-col">
                <textarea id="inputText" placeholder="Type text to translate..." class="w-full h-40 p-3 border border-gray-300 rounded-lg resize-none focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-700" maxlength="500"></textarea>
                <div class="text-right text-xs text-gray-400 mt-1" id="charCount">0 / 500</div>
            </div>

            <!-- Output Area -->
            <div class="relative flex flex-col">
                <div id="outputText" class="w-full h-40 p-3 bg-gray-50 border border-gray-300 rounded-lg overflow-y-auto text-gray-700 empty:before:content-['Translation_will_appear_here...'] empty:before:text-gray-400"></div>
                
                <!-- Action Buttons (Copy & TTS) -->
                <div class="absolute bottom-2 right-2 flex gap-2 invisible" id="actionButtons">
                    <!-- Copy Button -->
                    <button id="copyBtn" class="p-1.5 bg-white border border-gray-200 rounded-md hover:bg-gray-100 transition shadow-xs" title="Copy text">
                        📋
                    </button>
                    <!-- Text-to-Speech Button -->
                    <button id="speakBtn" class="p-1.5 bg-white border border-gray-200 rounded-md hover:bg-gray-100 transition shadow-xs" title="Listen to translation">
                        🔊
                    </button>
                </div>
            </div>
        </div>

        <!-- Submit Button -->
        <button id="translateBtn" class="w-full mt-5 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition-all shadow-md focus:outline-none active:scale-98">
            Translate Text
        </button>
    </div>

    <!-- Application JavaScript Logic -->
    <script>
        const sourceLang = document.getElementById('sourceLang');
        const targetLang = document.getElementById('targetLang');
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const translateBtn = document.getElementById('translateBtn');
        const charCount = document.getElementById('charCount');
        const actionButtons = document.getElementById('actionButtons');
        const copyBtn = document.getElementById('copyBtn');
        const speakBtn = document.getElementById('speakBtn');

        // Update character counter dynamically
        inputText.addEventListener('input', () => {
            charCount.textContent = `${inputText.value.length} / 500`;
        });

        // Main Translation API Function
        async function performTranslation() {
            const text = inputText.value.trim();
            const source = sourceLang.value;
            const target = targetLang.value;

            if (!text) {
                outputText.textContent = "";
                actionButtons.classList.add('invisible');
                return;
            }

            // UI Feedback during request
            translateBtn.disabled = true;
            translateBtn.textContent = "Translating...";
            outputText.textContent = "Translating content...";
            actionButtons.classList.add('invisible');

            try {
                // Utilizing MyMemory API for translation execution
                const response = await fetch(`https://translated.net{encodeURIComponent(text)}&langpair=${source}|${target}`);
                const data = await response.json();

                if (data.responseData) {
                    outputText.textContent = data.responseData.translatedText;
                    actionButtons.classList.remove('invisible'); // Show copy/speech functions
                } else {
                    outputText.textContent = "Error: Unable to process translation.";
                }
            } catch (error) {
                outputText.textContent = "Network error. Please check your connection.";
                console.error(error);
            } finally {
                translateBtn.disabled = false;
                translateBtn.textContent = "Translate Text";
            }
        }

        // Event listener for button click
        translateBtn.addEventListener('click', performTranslation);

        // Optional Requirement 1: Copy to Clipboard
        copyBtn.addEventListener('click', () => {
            const textToCopy = outputText.textContent;
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalEmoji = copyBtn.textContent;
                copyBtn.textContent = "✅";
                setTimeout(() => copyBtn.textContent = originalEmoji, 1500);
            });
        });

        // Optional Requirement 2: Text-To-Speech (Audio Output)
        speakBtn.addEventListener('click', () => {
            const textToSpeak = outputText.textContent;
            if (!textToSpeak) return;

            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = targetLang.value; // Map voice to target language accent
            window.speechSynthesis.speak(utterance);
        });
    </script>
</body>
</html>
